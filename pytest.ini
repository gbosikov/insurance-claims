[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
env =
    DATABASE_URL=postgresql+asyncpg://test:test@localhost:5432/test
    REDIS_URL=redis://:test@localhost:6379/1
    ANTHROPIC_API_KEY=sk-ant-test-key
    STORAGE_BUCKET=test-bucket
    STORAGE_PROVIDER=local
    CORE_API_BASE_URL=http://mock-core
    CORE_API_USERNAME=test
    CORE_API_PASSWORD=test-password
    ENVIRONMENT=test
    SECRET_KEY=test-secret
    EMBEDDING_MODEL=intfloat/multilingual-e5-large
    TRANSFORMERS_CACHE=/tmp/cache
    CLAUDE_MODEL=claude-opus
    CLAUDE_EXTRACTION_MAX_TOKENS=1000
    CLAUDE_EXTRACTION_TEMPERATURE=0.0
