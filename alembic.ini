# Alembic — управление схемой БД.
#
# URL базы НЕ задаётся здесь: env.py читает database_url из core.config
# (переменная окружения DATABASE_URL).
#
# Применить миграции:   alembic upgrade head   (или make migrate)
# Новая ревизия:        alembic revision -m "описание"
# Автогенерация:        alembic revision --autogenerate -m "описание"

[alembic]
script_location = alembic
prepend_sys_path = .
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
